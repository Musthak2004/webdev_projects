<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <style>
      body {
        background-color: #fff;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }
      #form-group {
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="text-align: center">SURVEY FORM</h1>
      <p style="text-align: center">We appreciate your participation...</p>
    </header>

    <main>
      <div id="form-group">
        <form id="survey-form">
          <p><strong>Personal information</strong></p>

          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Enter your name"
          />

          <br /><br />

          <label>Gender</label>
          <label><input type="radio" name="gender" value="male" /> Male</label>
          <label
            ><input type="radio" name="gender" value="female" /> Female</label
          >

          <br /><br />

          <label for="address">Address</label>
          <input
            type="text"
            id="address"
            required
            placeholder="Enter address"
          />

          <br /><br />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="example@email.com"
          />

          <br /><br />

          <label for="phone">Phone</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            placeholder="+123456789"
          />

          <br /><br />

          <p><strong>Question 1</strong></p>
          <textarea id="q1" name="q1" rows="4" cols="50"></textarea>

          <p><strong>Question 2</strong></p>
          <textarea id="q2" name="q2" rows="4" cols="50"></textarea>

          <p><strong>Question 3</strong></p>
          <textarea id="q3" name="q3" rows="4" cols="50"></textarea>

          <br /><br />

          <button type="submit">Submit</button>
        </form>
      </div>
    </main>
  </body>
</html>
